name: Deploy static app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare published app
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          html = re.sub(
              r"function esc\(v\)\{.*?\}function attr",
              "function esc(v){let d=document.createElement('div');d.textContent=v||'';return d.innerHTML}function attr",
              html,
              count=1,
          )
          path.write_text(html, encoding='utf-8')
          PY

      - name: Validate app script
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const match = html.match(/<script>([\s\S]*)<\/script>/);
          if (!match) throw new Error('App script was not found');
          new Function(match[1]);
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
