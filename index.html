<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Reform Flow</title><style>:root{--bg:#f4f6f7;--paper:#fff;--ink:#202523;--muted:#68716d;--line:#dbe2df;--teal:#14786f;--soft:#ddf0ed;--amber:#bd7b12;--coral:#c94f3b;--shadow:0 12px 30px #20252314}*{box-sizing:border-box}body{margin:0;min-width:320px;background:var(--bg);color:var(--ink);font-family:'Yu Gothic UI','Meiryo',system-ui,sans-serif;font-size:15px;line-height:1.5}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{padding:14px 14px 86px;max-width:1120px;margin:auto}h1,h2,h3,p{margin:0}h1{font-size:22px}.sub{color:var(--muted);font-size:12px}.nav{position:fixed;inset:auto 0 0 0;z-index:9;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:6px 8px calc(6px + env(safe-area-inset-bottom));background:#202724;box-shadow:0 -12px 28px #2025232e}.nav button{min-height:52px;border:0;border-radius:8px;background:transparent;color:#aebbb5;font-size:12px}.nav button.on{background:#ffffff1f;color:#fff}.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}.tools{display:grid;grid-template-columns:1fr 44px 44px;gap:8px;margin-bottom:12px}input,select,textarea,.btn{width:100%;min-height:40px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);padding:8px 10px;outline:0}.btn{display:inline-flex;align-items:center;justify-content:center;padding:0 12px}.primary{background:var(--teal);border-color:var(--teal);color:#fff}.danger{background:#fff8f7;border-color:#edc7c2;color:#a8322c}.view{display:none;gap:12px}.view.on{display:grid}.grid{display:grid;gap:10px}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.card,.panel{border:1px solid var(--line);border-radius:8px;background:var(--paper);box-shadow:var(--shadow)}.card{min-height:96px;padding:10px;display:grid;align-content:space-between;gap:6px}.card b{font-size:20px}.card small{color:var(--muted)}.panel{padding:12px}.head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.pill{display:inline-flex;min-height:24px;align-items:center;border-radius:999px;background:#eef3f1;padding:0 9px;font-size:12px;font-weight:700;white-space:nowrap}.契約,.着工,.施工中{background:var(--soft);color:var(--teal)}.提案,.見積{background:#f6ead6;color:var(--amber)}.検査{background:#e3f0df;color:#3e7d35}.引渡し{background:#e7e9ed;color:#5b5f67}.保留{background:#f7e2dd;color:var(--coral)}.meter{height:7px;background:#dce3e0;border-radius:999px;overflow:hidden}.meter span{display:block;height:100%;background:var(--teal);border-radius:999px}.bars{display:grid;grid-template-columns:repeat(6,1fr);height:188px;align-items:end;gap:7px}.barwrap{display:grid;gap:5px;align-content:end;height:100%;text-align:center;font-size:10px;color:var(--muted)}.bar{display:flex;flex-direction:column;justify-content:end;background:#edf1ef;border-radius:7px;overflow:hidden}.f{background:var(--amber)}.c{background:var(--teal)}.row,.project,.pipe{border:1px solid var(--line);border-radius:8px;background:#fbfcfc;padding:10px}.row{display:flex;justify-content:space-between;gap:10px}.soon{background:#fffaf0;border-color:#ead2a9}.late{background:#fff8f7;border-color:#edc7c2}.project{width:100%;display:grid;gap:8px;text-align:left;color:var(--ink)}.project.on{border-color:var(--teal);background:#f8fffd}.project header{display:flex;justify-content:space-between;gap:8px}.meta,.kv{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px}.kv b{color:var(--ink)}.fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:700}.wide{grid-column:1/-1}.actions{display:flex;justify-content:space-between;gap:10px}.empty{border:1px dashed #b9c4bf;border-radius:8px;padding:16px;text-align:center;color:var(--muted);background:#fbfcfc}.toast{position:fixed;right:14px;bottom:84px;z-index:10;max-width:calc(100vw - 28px);padding:10px 12px;border-radius:8px;background:#202523;color:#fff;opacity:0;transform:translateY(8px);transition:160ms;pointer-events:none}.toast.on{opacity:1;transform:translateY(0)}@media(min-width:900px){.app{padding:24px 24px 32px 118px}.nav{inset:0 auto 0 0;width:92px;grid-template-columns:1fr;grid-template-rows:repeat(4,74px);align-content:start;padding:16px 10px}.kpis{grid-template-columns:repeat(4,1fr)}.dash,.sales,.layout{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(320px,.8fr);gap:12px}.fields{grid-template-columns:repeat(4,1fr)}.fields .wide{grid-column:span 2}.toast{bottom:18px}}</style></head><body><nav class='nav'><button class='on' data-tab='home'>概要</button><button data-tab='projects'>案件</button><button data-tab='sales'>売上</button><button data-tab='settings'>設定</button></nav><main class='app'><div class='top'><div><h1 id='title'>Reform Flow</h1><p class='sub' id='today'></p></div></div><div class='tools'><input id='search' placeholder='案件・顧客・現場'><button class='btn' id='export'>保存</button><button class='btn' id='import'>復元</button><input id='file' type='file' accept='application/json' hidden></div><section id='home' class='view on'><div class='grid kpis' id='kpis'></div><div class='dash'><section class='panel'><div class='head'><div><h2>今日見る工程</h2><p class='sub'>期限が近い未完了タスク</p></div></div><div class='grid' id='tasks'></div></section><section class='panel'><div class='head'><div><h2>売上達成見込み</h2><p class='sub'>6か月先までの予測</p></div></div><div id='chart'></div></section></div><section class='panel'><div class='head'><h2>重点案件</h2></div><div class='grid' id='priority'></div></section></section><section id='projects' class='view'><section class='panel'><div class='head'><div><h2>案件</h2><p class='sub' id='count'></p></div><button class='btn primary' id='new'>案件追加</button></div></section><div class='layout'><section class='panel'><div class='grid' id='list'></div></section><section class='panel'><form class='grid' id='form'><div class='head'><div><h2>案件詳細</h2><p class='sub' id='summary'></p></div><span id='phaseBadge' class='pill'>見積</span></div><div class='fields'><label class='wide'>案件名<input id='name' required></label><label class='wide'>顧客名<input id='client'></label><label class='wide'>現場<input id='place'></label><label>工程<select id='phase'></select></label><label>売上<input id='amount' type='number' step='10000'></label><label>原価<input id='cost' type='number' step='10000'></label><label>確度<input id='prob' type='number' min='0' max='100' step='5'></label><label>進捗<input id='prog' type='number' min='0' max='100'></label><label>着工<input id='start' type='date'></label><label>完了<input id='end' type='date'></label><label>計上月<input id='target' type='month'></label><label>入金月<input id='cash' type='month'></label></div><label>メモ<textarea id='notes' rows='3'></textarea></label><div class='head'><h3>工程チェック</h3><button type='button' class='btn' id='addTask'>工程追加</button></div><div class='grid' id='taskEdit'></div><div class='actions'><button type='button' class='btn danger' id='del'>削除</button><button class='btn primary'>保存</button></div></form></section></div></section><section id='sales' class='view'><section class='panel'><div class='head'><h2>月別売上見込み</h2></div><div id='salesChart'></div></section><div class='sales'><section class='panel'><div class='head'><h2>達成率</h2></div><div class='grid' id='achievement'></div></section><section class='panel'><div class='head'><h2>入金予定</h2></div><div class='grid' id='cashflow'></div></section></div><section class='panel'><div class='head'><h2>案件別見込み</h2></div><div class='grid' id='pipeline'></div></section></section><section id='settings' class='view'><section class='panel'><form id='setForm' class='grid'><div class='head'><h2>個人設定</h2></div><div class='fields'><label class='wide'>表示名<input id='owner'></label><label>月間売上目標<input id='monthly' type='number' step='100000'></label><label>年間売上目標<input id='annual' type='number' step='100000'></label></div><button class='btn primary'>設定を保存</button></form></section><section class='panel'><div class='head'><div><h2>データ</h2><p class='sub'>このブラウザ内に保存されます</p></div><button class='btn danger' id='reset'>サンプルに戻す</button></div></section></section></main><div id='toast' class='toast'></div><script>const K='reform-flow-state-v1',P=['見積','提案','契約','着工','施工中','検査','引渡し','保留'],C=['契約','着工','施工中','検査','引渡し'],$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];let S=load(),tab='home',sel=S.projects[0]?.id||'',q='';$('#phase').innerHTML=P.map(p=>`<option>${p}</option>`).join('');$$('.nav button').forEach(b=>b.onclick=()=>show(b.dataset.tab));$('#search').oninput=e=>{q=e.target.value.trim().toLowerCase();render()};$('#new').onclick=()=>{let p=blank();S.projects.unshift(p);sel=p.id;save();show('projects');render();msg('案件を追加しました')};$('#list').onclick=e=>{let b=e.target.closest('[data-id]');if(b){sel=b.dataset.id;renderProjects()}};$('#form').onsubmit=e=>{e.preventDefault();saveProject()};$('#del').onclick=()=>{let p=cur();if(!p||!confirm(p.name+' を削除しますか？'))return;S.projects=S.projects.filter(x=>x.id!==p.id);sel=S.projects[0]?.id||'';save();render();msg('案件を削除しました')};$('#addTask').onclick=()=>{cur().tasks.push({id:id(),title:'新しい工程',due:ymd(addDays(new Date(),7)),done:false});save();renderProjects()};$('#taskEdit').oninput=taskChange;$('#taskEdit').onchange=taskChange;$('#taskEdit').onclick=e=>{let b=e.target.closest('[data-del-task]');if(!b)return;let p=cur();p.tasks=p.tasks.filter(t=>t.id!==b.dataset.delTask);save();render()};$('#setForm').onsubmit=e=>{e.preventDefault();S.settings={owner:$('#owner').value.trim()||'自分',monthlyTarget:num($('#monthly').value),annualTarget:num($('#annual').value)};save();render();msg('設定を保存しました')};$('#reset').onclick=()=>{if(confirm('現在のデータをサンプルに戻しますか？')){S=seed();sel=S.projects[0].id;save();render();msg('サンプルに戻しました')}};$('#export').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));a.download='reform-flow-backup-'+ymd(new Date())+'.json';a.click();URL.revokeObjectURL(a.href)};$('#import').onclick=()=>$('#file').click();$('#file').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(!Array.isArray(d.projects))throw Error();S={settings:d.settings||seed().settings,projects:d.projects.map(norm)};sel=S.projects[0]?.id||'';save();render();msg('復元しました')}catch{msg('復元できないファイルです')}e.target.value=''};r.readAsText(f)};render();function show(t){tab=t;$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));$$('.view').forEach(v=>v.classList.toggle('on',v.id===t));$('#title').textContent={home:'概要',projects:'案件',sales:'売上',settings:'設定'}[t]}function render(){$('#today').textContent=new Intl.DateTimeFormat('ja-JP',{dateStyle:'full'}).format(new Date())+' / '+S.settings.owner;renderHome();renderProjects();renderSales();renderSettings();show(tab)}function renderHome(){let m=stats(1)[0],open=tasks(),active=S.projects.filter(p=>!['引渡し','保留'].includes(p.phase)),avg=active.length?sum(active.map(p=>p.progress))/active.length:0,profit=m.weighted-m.cost,rate=m.target?m.weighted/m.target:0;let cards=[['今月見込み',yen(m.weighted),'目標 '+yen(m.target)+' / '+Math.round(rate*100)+'%',rate],['契約・進行中',yen(m.confirmed),m.confirmedCount+'件が確定枠',m.target?m.confirmed/m.target:0],['粗利見込み',yen(profit),'粗利率 '+(m.weighted?Math.round(profit/m.weighted*100):0)+'%',m.weighted?profit/m.weighted:0],['未完了工程',open.length+'件','平均進捗 '+Math.round(avg)+'%',avg/100]];$('#kpis').innerHTML=cards.map(c=>`<article class='card'><span class='sub'>${c[0]}</span><div><b>${c[1]}</b><br><small>${c[2]}</small></div><div class='meter'><span style='width:${Math.min(Math.max(c[3],0),1)*100}%'></span></div></article>`).join('');$('#tasks').innerHTML=open.length?open.slice(0,small()?4:7).map(taskHtml).join(''):`<div class='empty'>未完了の工程はありません</div>`;chart('chart');$('#priority').innerHTML=filtered().filter(p=>p.phase!=='引渡し').sort((a,b)=>score(b)-score(a)).slice(0,small()?4:6).map(mini).join('')||`<div class='empty'>表示できる案件がありません</div>`}function chart(id){let ss=stats(6),mx=Math.max(1,...ss.map(s=>s.weighted),...ss.map(s=>s.target));$('#'+id).innerHTML=`<div class='bars'>${ss.map(s=>{let h=Math.max(8,s.weighted/mx*150),c=s.weighted?s.confirmed/s.weighted*h:0,f=Math.max(0,h-c);return`<div class='barwrap'><b>${yen(s.weighted)}</b><div class='bar' style='height:${h}px'><span class='f' style='height:${f}px'></span><span class='c' style='height:${c}px'></span></div><span>${small()?shortMonth(s.month):labelMonth(s.month)}</span></div>`}).join('')}</div>`}function renderProjects(){let list=filtered();$('#count').textContent=list.length+'件';if(sel&&!S.projects.some(p=>p.id===sel))sel=S.projects[0]?.id||'';$('#list').innerHTML=list.map(card).join('')||`<div class='empty'>該当する案件がありません</div>`;fill()}function card(p){return`<button class='project ${p.id===sel?'on':''}' data-id='${p.id}'><header><div><b>${esc(p.name)}</b><p class='sub'>${esc(p.client||p.location||'顧客未設定')}</p></div>${pill(p.phase)}</header><div class='meter'><span style='width:${clamp(p.progress,0,100)}%'></span></div><div class='meta'><span>${yen(p.amount)} / ${clamp(p.prob,0,100)}%</span><span>${dateShort(p.end)}</span></div></button>`}function mini(p){return`<div class='project'><header><div><b>${esc(p.name)}</b><p class='sub'>${esc(p.client||p.location||'')}</p></div>${pill(p.phase)}</header><div class='kv'><span>売上</span><b>${yen(p.amount)}</b></div><div class='kv'><span>完了予定</span><b>${dateShort(p.end)}</b></div><div class='meter'><span style='width:${clamp(p.progress,0,100)}%'></span></div></div>`}function fill(){let p=cur();$('#form').toggleAttribute('inert',!p);if(!p)return;[['name',p.name],['client',p.client],['place',p.location],['phase',p.phase],['amount',p.amount],['cost',p.cost],['prob',p.prob],['prog',p.progress],['start',p.start],['end',p.end],['target',p.targetMonth],['cash',p.cashMonth],['notes',p.notes]].forEach(x=>$('#'+x[0]).value=x[1]??'');$('#summary').textContent=yen(p.amount)+' / 確度 '+clamp(p.prob,0,100)+'%';$('#phaseBadge').outerHTML=pill(p.phase,'phaseBadge');$('#taskEdit').innerHTML=p.tasks.length?p.tasks.map(t=>`<div class='row' data-task='${t.id}'><input data-f='done' type='checkbox' ${t.done?'checked':''}><input data-f='title' value='${attr(t.title)}'><input data-f='due' type='date' value='${attr(t.due)}'><button type='button' class='btn' data-del-task='${t.id}'>削除</button></div>`).join(''):`<div class='empty'>工程はまだありません</div>`}function saveProject(){let p=cur();Object.assign(p,{name:$('#name').value.trim()||'無題の案件',client:$('#client').value.trim(),location:$('#place').value.trim(),phase:$('#phase').value,amount:num($('#amount').value),cost:num($('#cost').value),prob:clamp($('#prob').value,0,100),progress:clamp($('#prog').value,0,100),start:$('#start').value,end:$('#end').value,targetMonth:$('#target').value||monthKey(new Date()),cashMonth:$('#cash').value||$('#target').value||monthKey(new Date()),notes:$('#notes').value.trim()});save();render();msg('案件を保存しました')}function taskChange(e){let row=e.target.closest('[data-task]'),p=cur();if(!row||!p)return;let t=p.tasks.find(x=>x.id===row.dataset.task);if(e.target.dataset.f==='done')t.done=e.target.checked;if(e.target.dataset.f==='title')t.title=e.target.value;if(e.target.dataset.f==='due')t.due=e.target.value;save();renderHome();renderSales()}function renderSales(){chart('salesChart');$('#achievement').innerHTML=stats(6).map(s=>{let r=s.target?s.weighted/s.target:0;return`<div class='pipe'><div class='kv'><b>${labelMonth(s.month)}</b><b>${Math.round(r*100)}%</b></div><div class='meter'><span style='width:${Math.min(r,1)*100}%'></span></div><p class='sub'>${yen(s.weighted)} / ${yen(s.target)}</p></div>`}).join('');$('#cashflow').innerHTML=months(6).map(m=>{let ps=S.projects.filter(p=>p.cashMonth===m);return{m,ps,amount:sum(ps.map(weighted))}}).filter(r=>r.ps.length||r.m===monthKey(new Date())).map(r=>`<div class='row'><div><b>${labelMonth(r.m)}</b><p class='sub'>${r.ps.length}件</p></div><b>${yen(r.amount)}</b></div>`).join('')||`<div class='empty'>入金予定がありません</div>`;$('#pipeline').innerHTML=filtered().map(p=>`<div class='pipe'><b>${esc(p.name)}</b><div class='kv'><span>計上月</span><b>${labelMonth(p.targetMonth)}</b></div><div class='kv'><span>工程</span>${pill(p.phase)}</div><div class='kv'><span>見込み売上</span><b>${yen(weighted(p))}</b></div><div class='kv'><span>粗利見込み</span><b>${yen(weighted(p)-weightedCost(p))}</b></div></div>`).join('')||`<div class='empty'>表示できる案件がありません</div>`}function renderSettings(){$('#owner').value=S.settings.owner;$('#monthly').value=S.settings.monthlyTarget;$('#annual').value=S.settings.annualTarget}function filtered(){let hay=p=>[p.name,p.client,p.location,p.phase,p.notes].join(' ').toLowerCase();return S.projects.filter(p=>(!q||hay(p).includes(q)))}function cur(){return S.projects.find(p=>p.id===sel)||S.projects[0]}function tasks(){return S.projects.flatMap(p=>p.tasks.filter(t=>!t.done).map(t=>({...t,project:p}))).sort((a,b)=>safe(a.due)-safe(b.due))}function taskHtml(t){let d=days(t.due),txt=d<0?Math.abs(d)+'日遅れ':d===0?'今日':d+'日後';return`<div class='row ${d<0?'late':d<=3?'soon':''}'><div><b>${esc(t.title)}</b><p class='sub'>${esc(t.project.name)} / ${dateShort(t.due)}</p></div><span class='pill'>${txt}</span></div>`}function stats(n){return months(n).map(m=>{let ps=S.projects.filter(p=>p.targetMonth===m),cs=ps.filter(ok);return{month:m,target:num(S.settings.monthlyTarget),weighted:sum(ps.map(weighted)),cost:sum(ps.map(weightedCost)),confirmed:sum(cs.map(p=>p.amount)),confirmedCount:cs.length}})}function months(n){return Array.from({length:n},(_,i)=>monthKey(addMonths(new Date(),i)))}function ok(p){return C.includes(p.phase)||num(p.prob)>=100}function weighted(p){return ok(p)?num(p.amount):num(p.amount)*clamp(p.prob,0,100)/100}function weightedCost(p){return ok(p)?num(p.cost):num(p.cost)*clamp(p.prob,0,100)/100}function score(p){let d=days(p.end);return num(p.amount)/100000+num(p.prob)*5+(d<0?500:Math.max(0,80-d)*6)+Math.max(0,100-num(p.progress))}function blank(){let n=new Date();return{id:id(),name:'新しいリフォーム案件',client:'',location:'',phase:'見積',amount:0,cost:0,prob:30,progress:0,start:ymd(n),end:ymd(addDays(n,30)),targetMonth:monthKey(n),cashMonth:monthKey(addMonths(n,1)),notes:'',tasks:[{id:id(),title:'現地調査',due:ymd(addDays(n,3)),done:false},{id:id(),title:'見積提出',due:ymd(addDays(n,7)),done:false}]}}function seed(){let n=new Date(),rows=[['キッチン改修','サンプルA','施工中',4200000,2750000,100,64,-18,18,0,1],['賃貸原状回復','管理会社サンプル','契約',1680000,980000,100,32,-4,12,0,0],['浴室更新','サンプルB','見積',2900000,1830000,65,12,22,46,1,2],['店舗内装リニューアル','店舗サンプル','提案',8600000,5900000,45,8,38,78,2,3],['外壁・屋根メンテ','サンプルC','検査',5100000,3210000,100,92,-34,3,0,1]];return{settings:{owner:'自分',monthlyTarget:8000000,annualTarget:90000000},projects:rows.map(r=>({id:id(),name:r[0],client:r[1],location:'サンプル現場',phase:r[2],amount:r[3],cost:r[4],prob:r[5],progress:r[6],start:ymd(addDays(n,r[7])),end:ymd(addDays(n,r[8])),targetMonth:monthKey(addMonths(n,r[9])),cashMonth:monthKey(addMonths(n,r[10])),notes:'サンプルデータです。実案件に置き換えて使ってください。',tasks:[{id:id(),title:'現地調査',due:ymd(addDays(n,2)),done:false},{id:id(),title:'見積・工程確認',due:ymd(addDays(n,5)),done:false}]}))}}function norm(p){return{...blank(),...p,tasks:Array.isArray(p.tasks)?p.tasks.map(t=>({id:t.id||id(),title:t.title||'工程',due:t.due||'',done:!!t.done})):[]}}function load(){try{let d=JSON.parse(localStorage.getItem(K));return d&&Array.isArray(d.projects)?{settings:d.settings||seed().settings,projects:d.projects.map(norm)}:seed()}catch{return seed()}}function save(){localStorage.setItem(K,JSON.stringify(S))}function pill(p,i){return`<span ${i?`id='${i}'`:''} class='pill ${p}'>${p}</span>`}function monthKey(d){let x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')}function labelMonth(k){let a=k.split('-');return num(a[0])+'年'+num(a[1])+'月'}function shortMonth(k){return num(k.split('-')[1])+'月'}function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function addMonths(d,n){let x=new Date(d);x.setMonth(x.getMonth()+n);return x}function ymd(d){let x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}function safe(v){let d=v?new Date(v+'T00:00:00'):null;return d&&!isNaN(d)?d.getTime():9e15}function days(v){if(!v)return 999;let t=new Date(),s=new Date(t.getFullYear(),t.getMonth(),t.getDate()),d=new Date(v+'T00:00:00');return isNaN(d)?999:Math.round((d-s)/86400000)}function dateShort(v){let d=v?new Date(v+'T00:00:00'):null;return d&&!isNaN(d)?d.getMonth()+1+'/'+d.getDate():'-'}function yen(v){let m=Math.round((v||0)/10000);return Math.abs(m)>=10000?((m/10000).toFixed(1).replace('.0','')+'億円'):(m.toLocaleString('ja-JP')+'万円')}function num(v){let n=Number(v);return Number.isFinite(n)?n:0}function sum(a){return a.reduce((x,y)=>x+num(y),0)}function clamp(v,min,max){return Math.min(Math.max(num(v),min),max)}function id(){return crypto&&crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+Math.random().toString(16).slice(2)}function small(){return matchMedia('(max-width:560px)').matches}function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('\'','&#039;')}function attr(v){return esc(v).replaceAll('`','&#096;')}function msg(m){let t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(window.toaster);window.toaster=setTimeout(()=>t.classList.remove('on'),2200)}</script></body></html>
